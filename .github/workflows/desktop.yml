name: desktop

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    paths:
      - "desktop/**"
      - "src/**"
      - "index.html"
      - ".github/workflows/desktop.yml"
  workflow_dispatch:

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

# Builds the Electron AppImage on the ai1 self-hosted runner, smoke-boots the
# PACKAGED binary headless (CDP), uploads the artifact, and — on master —
# publishes it to the rolling `desktop-latest` GitHub Release so the current
# build is always one click away on the Releases page. Electron binaries and
# builder tools cache in ~/.cache on the runner, so warm runs are fast.
permissions:
  contents: write

jobs:
  appimage:
    name: electron appimage
    runs-on: [self-hosted, ai1]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install shell deps
        working-directory: desktop
        run: |
          npm ci --no-audit --no-fund
          node node_modules/electron/install.js || true
          ./scripts/ensure-electron.sh
      - name: Build AppImage
        working-directory: desktop
        run: npm run dist
      - name: Smoke-boot packaged binary
        working-directory: desktop
        run: |
          VENV="$HOME/.cache/stm-ci/venv"
          [ -x "$VENV/bin/python" ] || python3 -m venv "$VENV"
          "$VENV/bin/pip" install -q playwright
          "$VENV/bin/python" scripts/smoke.py
      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: singularity-tycoon-appimage
          path: desktop/dist/*.AppImage
          retention-days: 14
          compression-level: 0
      - name: Publish release
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            # Versioned release: attach the build to the pushed tag
            TAG="${GITHUB_REF_NAME}"
            gh release view "$TAG" >/dev/null 2>&1 || \
              gh release create "$TAG" --title "Singularity Tycoon $TAG" \
                --notes "Desktop build for $TAG. Linux AppImage: download, \`chmod +x\`, run."
            gh release upload "$TAG" desktop/dist/*.AppImage --clobber
          else
            # Rolling release: always the newest master build
            gh release view desktop-latest >/dev/null 2>&1 || \
              gh release create desktop-latest --prerelease \
                --title "🖥 Singularity Tycoon — desktop (latest master)" \
                --notes "Rolling desktop build."
            gh release upload desktop-latest desktop/dist/*.AppImage --clobber
            gh release edit desktop-latest \
              --notes "Rolling desktop build from master. Linux AppImage: download, \`chmod +x\`, run. Windows/macOS need their own runners (desktop/README.md). Commit: ${GITHUB_SHA} · $(date -u +%Y-%m-%dT%H:%MZ)"
          fi
