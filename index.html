<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Singularity Tycoon — Mini</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230a0f1c'/%3E%3Ccircle cx='16' cy='16' r='6' fill='none' stroke='%234af0c0' stroke-width='2'/%3E%3Ccircle cx='16' cy='16' r='2' fill='%234af0c0'/%3E%3C/svg%3E" />
    <link
      href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@700,500&f[]=satoshi@700,500,400&f[]=jetbrains-mono@500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="src/style.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">
          <svg class="logo" viewBox="0 0 32 32" aria-label="Singularity Tycoon">
            <circle cx="16" cy="16" r="10" fill="none" stroke="currentColor" stroke-width="1.5" />
            <circle cx="16" cy="16" r="5" fill="none" stroke="currentColor" stroke-width="1.5" />
            <circle cx="16" cy="16" r="1.5" fill="currentColor" />
          </svg>
          <div class="brand-text">
            <span class="brand-name">SINGULARITY</span>
            <span class="brand-sub">tycoon · mini</span>
          </div>
        </div>
        <div class="hud" id="hud">
          <div class="hud-cell"><span class="hud-label">Cash</span><span class="hud-value" id="hud-cash">$0</span></div>
          <div class="hud-cell"><span class="hud-label">Compute</span><span class="hud-value" id="hud-compute">0 TFLOPS</span></div>
          <div class="hud-cell"><span class="hud-label">Power</span><span class="hud-value" id="hud-power">0 / 0 MW</span></div>
          <div class="hud-cell"><span class="hud-label">Cooling</span><span class="hud-value" id="hud-cooling">0 / 0 kW</span></div>
          <div class="hud-cell"><span class="hud-label">Revenue</span><span class="hud-value pos" id="hud-revenue">+$0/s</span></div>
          <div class="hud-cell"><span class="hud-label">Jobs</span><span class="hud-value" id="hud-jobs">+0</span></div>
          <div class="hud-cell"><span class="hud-label">Public</span><span class="hud-value" id="hud-sentiment">60%</span></div>
          <div class="hud-cell"><span class="hud-label">Debt</span><span class="hud-value" id="hud-debt">—</span></div>
          <div class="hud-cell"><span class="hud-label">Entropy</span><span class="hud-value" id="hud-entropy">0%</span></div>
        </div>
      </header>

      <aside class="palette" id="palette">
        <h2 class="palette-title">Build</h2>
        <div class="tools" id="tools"></div>
        <h2 class="palette-title">Research</h2>
        <div class="research" id="research"></div>
        <h2 class="palette-title">Finance</h2>
        <div class="finance" id="finance"></div>
        <div class="palette-foot">
          <button class="ghost-btn" id="btn-help">How to play</button>
        </div>
      </aside>

      <main class="stage">
        <canvas id="game" width="960" height="720" tabindex="0"></canvas>
        <div class="ticker" id="ticker"></div>
        <div class="goal" id="goal">
          <div class="goal-label">Goal</div>
          <div class="goal-text" id="goal-text">Reach $1,000,000 to unlock the Dyson Sphere blueprint.</div>
          <div class="goal-bar"><div class="goal-bar-fill" id="goal-bar-fill"></div></div>
        </div>

        <div class="music" id="music">
          <div class="music-head">
            <span class="music-label">♪ Music</span>
            <button class="music-mute" id="music-mute" aria-label="Mute music">mute</button>
          </div>
          <div class="music-vibes" id="music-vibes">
            <button class="music-vibe selected" data-vibe="hopeful">Hopeful</button>
            <button class="music-vibe" data-vibe="dark">Dark</button>
            <button class="music-vibe" data-vibe="cinematic">Cinematic</button>
            <button class="music-vibe" data-vibe="lofi">Lo-fi</button>
          </div>
          <input class="music-volume" id="music-volume" type="range" min="0" max="100" value="70" aria-label="Music volume" />
        </div>

        <div class="audio-prompt" id="audio-prompt">
          <button class="audio-start-btn" id="audio-start">♪ Click to enable music</button>
        </div>

        <div class="dev" id="dev">
          <button class="dev-toggle" id="dev-toggle">⚙ DEV</button>
          <div class="dev-body" id="dev-body" hidden>
            <label><input type="checkbox" data-god="freeBuild" /> Free build</label>
            <label><input type="checkbox" data-god="noWear" /> No wear</label>
            <label><input type="checkbox" data-god="noEntropy" /> No entropy</label>
            <label><input type="checkbox" data-god="pinSentiment" /> Pin sentiment 75</label>
            <label><input type="checkbox" data-god="fast" /> 5× speed</label>
            <button class="dev-cash" id="dev-cash">+$10k</button>
          </div>
        </div>
      </main>

      <div class="tooltip" id="tooltip" hidden></div>

      <div class="modal" id="modal" hidden>
        <div class="modal-card">
          <h2 id="modal-title">How to play</h2>
          <div id="modal-body"></div>
          <button class="primary-btn" id="modal-close">Got it</button>
        </div>
      </div>
    </div>

    <!-- Classic scripts (load order matters) so the game runs straight from
         file:// — browsers block ES modules on file:// pages. -->
    <script src="src/audio/synth-recipes.js"></script>
    <script src="src/audio/audio-engine.js"></script>
    <script src="src/audio/index.js"></script>
    <script src="src/main.js"></script>
  </body>
</html>
